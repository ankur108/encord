name: Run Encord Pipeline

on:
  push:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ENCORD_PRIVATE_KEY_PATH: ${{ secrets.ENCORD_API_KEYS_PRIVATE_KEY }}
          # ENCORD_GCS_INTEGRATION_TITLE: ${{ vars.ENCORD_GCS_INTEGRATION_TITLE }}
          # ENCORD_GCS_REMOTE_URL: ${{ vars.ENCORD_GCS_REMOTE_URL }}
        run: python main.py
